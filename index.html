<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Dice Roller</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>🎲 3D Dice Roller</h1>

        <div class="scene">
            <div class="dice" id="dice">

                <div class="face front">
                    <span class="dot center"></span>
                </div>

                <div class="face back">
                    <span class="dot tl"></span>
                    <span class="dot ml"></span>
                    <span class="dot bl"></span>
                    <span class="dot tr"></span>
                    <span class="dot mr"></span>
                    <span class="dot br"></span>
                </div>

                <div class="face right">
                    <span class="dot tl"></span>
                    <span class="dot center"></span>
                    <span class="dot br"></span>
                </div>

                <div class="face left">
                    <span class="dot tl"></span>
                    <span class="dot tr"></span>
                    <span class="dot bl"></span>
                    <span class="dot br"></span>
                </div>

                <div class="face top">
                    <span class="dot tl"></span>
                    <span class="dot tr"></span>
                    <span class="dot center"></span>
                    <span class="dot bl"></span>
                    <span class="dot br"></span>
                </div>

                <div class="face bottom">
                    <span class="dot tl"></span>
                    <span class="dot br"></span>
                </div>

            </div>
        </div>

        <button id="rollBtn" onclick="rollDice()">
            Roll Dice
        </button>

        <h2 id="result">Click Roll!</h2>

    </div>

    
    <audio id="diceSound" src="dice-roll.mp3"></audio>
    <script src="script.js"></script>

</body>
</html>
